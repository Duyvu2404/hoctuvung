<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Học Tập Nhật Ngữ Pro</title>
    <style>
        :root {
            /* Nền xanh đậm */
            --bg-color: #0b132b; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --kanji-color: #ff3366; /* Đỏ hồng đậm nổi bật */
            --text-info: #ffffff;
            --text-muted: #8d99ae;
            --accent: #00f5d4; /* Xanh ngọc mượt mà */
            --danger: #ef233c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            min-height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-info);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- Hiệu ứng Hoa Anh Đào Rơi --- */
        #sakura-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            pointer-events: none; /* Không cản trở click chuột */
            z-index: 1;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7b2, #e28495);
            border-radius: 15px 0 15px 0;
            opacity: 0.8;
            box-shadow: 0 0 10px rgba(255, 183, 178, 0.5);
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }
        @keyframes fall {
            0% { top: -10%; transform: rotate(0deg); }
            100% { top: 110%; transform: rotate(360deg); }
        }
        @keyframes sway {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(50px) rotate(45deg); }
        }

        /* --- Robot lơ lửng --- */
        .robot-mascot {
            position: absolute;
            right: 5%;
            bottom: 10%;
            width: 120px;
            animation: floatRobot 4s ease-in-out infinite;
            z-index: 50;
            pointer-events: none;
        }
        @keyframes floatRobot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- Header & Nav --- */
        header {
            width: 90%;
            max-width: 1200px;
            margin: 25px auto 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: var(--accent); }

        nav { display: flex; gap: 10px; }
        nav button {
            background: transparent;
            border: 1px solid transparent;
            padding: 8px 18px;
            font-size: 15px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
            font-weight: 600;
        }
        nav button.active {
            color: var(--text-info);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        nav button:hover:not(.active) { color: var(--text-info); }

        /* --- View Container --- */
        .view-container {
            width: 100%;
            min-height: calc(100vh - 100px);
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px 0 46px;
        }
        body.vault-page-mode .view-container {
            align-items: flex-start;
        }


        /* 1. Slide View */
        #slide-view {
            width: 100%; min-height: calc(100vh - 150px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .kanji {
            font-size: 160px;
            font-weight: 900;
            color: var(--kanji-color);
            text-shadow: 0 0 30px rgba(255, 51, 102, 0.4);
            transition: transform 0.4s ease;
            z-index: 10;
        }
        .slide-up .kanji { transform: translateY(-30px); }
        
        .reveal-info {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .reveal-item {
            opacity: 0; transform: translateY(15px);
            transition: all 0.4s ease;
            font-weight: bold;
        }
        .reveal-item.visible { opacity: 1; transform: translateY(0); }
        .amhan { font-size: 24px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;}
        .hiragana { font-size: 45px; color: #fff; }
        .nghia { font-size: 30px; color: var(--accent); }
        
        .hint { position: absolute; bottom: 30px; color: var(--text-muted); animation: pulse 2s infinite; }
        .counter { position: absolute; bottom: 30px; right: 40px; font-weight: bold; font-size: 18px; color: var(--text-muted);}

        /* 2. Form View */
        #form-view { display: none; width: 500px; background: var(--glass-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);}
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold;}
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--text-muted); color: white; border-radius: 8px; outline: none; font-size: 16px;}
        .form-group textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,245,212,0.12); }
        .btn-submit { width: 100%; padding: 15px; background: var(--accent); color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn-submit:hover { background: #00c4a7; }

        /* 3. Kho Lưu Trữ (Vault View) */
        #vault-view {
            display: none; width: min(96vw, 1280px); min-height: calc(100vh - 150px); height: auto;
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
            padding: 24px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.14); backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
            flex-direction: column;
            margin: 6px auto 70px;
        }
        .vault-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 16px; }
        .vault-heading { display: flex; align-items: center; gap: 10px; }
        .vault-badge { font-size: 12px; font-weight: 900; color: #07151f; background: linear-gradient(90deg, var(--accent), #b8fff4); padding: 5px 9px; border-radius: 999px; letter-spacing: 0.5px; }
        .btn-export { background: linear-gradient(135deg, #27ae60, #00d084); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; box-shadow: 0 10px 22px rgba(39,174,96,0.18);}
        .btn-export:hover { transform: translateY(-1px); filter: brightness(1.05); }
        
        .vault-dashboard { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 14px; }
        .stat-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 13px 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
        .stat-label { color: var(--text-muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; }
        .stat-value { margin-top: 4px; color: #fff; font-size: 24px; font-weight: 900; }
        .table-container { overflow-x: auto; overflow-y: visible; flex-grow: 0; border-radius: 18px; border: 1px solid rgba(255,255,255,0.12); background: rgba(2,8,23,0.42); box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
        table { width: 100%; min-width: 1120px; border-collapse: separate; border-spacing: 0; text-align: left; table-layout: fixed; }
        th { background: rgba(0,0,0,0.62); padding: 14px 12px; color: var(--accent); position: sticky; top: 0; z-index: 2; font-size: 13px; text-transform: uppercase; letter-spacing: .45px; backdrop-filter: blur(10px); }
        td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top; }
        tbody tr { transition: 0.18s ease; }
        tbody tr:hover td { background: rgba(0,245,212,0.055); }
        .col-check { width: 50px; text-align: center; }
        .col-index { width: 64px; color: var(--text-muted); font-weight: 800; text-align: center; }
        .col-kanji { width: 150px; }
        .col-amhan { width: 150px; }
        .col-hira { width: 170px; }
        .col-meaning { width: 250px; }
        .col-note { width: 290px; }
        .col-action { width: 100px; text-align: center; position: sticky; right: 0; background: rgba(4,10,24,0.94); z-index: 1; }
        th.col-action { z-index: 3; background: rgba(0,0,0,0.75); }
        .kanji-cell { font-size: 22px; font-weight: 900; color: var(--kanji-color); line-height: 1.35; word-break: break-word; }
        .hira-cell { font-size: 18px; color: #fff; word-break: break-word; }
        .meaning-cell { color: var(--accent); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
        .note-cell { color: #d8e2ff; line-height: 1.55; white-space: pre-wrap; word-break: break-word; max-height: 92px; overflow: auto; padding-right: 6px; }
        .note-empty { color: rgba(255,255,255,0.32); font-style: italic; }
        .btn-delete { background: rgba(239, 35, 60, 0.2); color: var(--danger); border: 1px solid var(--danger); padding: 7px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Custom Scrollbar for Table */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- Nâng cấp kho lưu trữ + import --- */
        .vault-title-block { display: flex; flex-direction: column; gap: 6px; }
        .vault-stats { color: var(--text-muted); font-size: 13px; }
        .vault-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; align-items: center; }
        .vault-tools { display: grid; grid-template-columns: minmax(220px, 1fr) 170px auto auto auto; gap: 10px; margin-bottom: 14px; align-items: center; }
        .vault-search, .vault-select {
            padding: 12px 13px;
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            outline: none;
            min-width: 0;
        }
        .vault-select option { color: #111; }
        .vault-search:focus, .vault-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,245,212,0.12); }
        .filter-chip { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 13px; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: #fff; font-size: 13px; font-weight: 800; cursor: pointer; user-select: none; white-space: nowrap; }
        .filter-chip input { width: 16px; height: 16px; accent-color: var(--accent); }
        .btn-small, .btn-import, .btn-delete-selected, .btn-delete-all {
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 13px;
            transition: 0.25s;
            white-space: nowrap;
        }
        .btn-import { background: rgba(0,245,212,0.18); color: var(--accent); border: 1px solid var(--accent); display: inline-flex; align-items: center; gap: 6px; }
        .btn-import:hover { background: var(--accent); color: #001; }
        .btn-small { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
        .btn-small:hover { background: rgba(255,255,255,0.18); }
        .btn-delete-selected { background: rgba(255,183,3,0.18); color: #ffb703; border: 1px solid #ffb703; }
        .btn-delete-selected:hover { background: #ffb703; color: #111; }
        .btn-delete-all { background: rgba(239,35,60,0.18); color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete-all:hover { background: var(--danger); color: white; }
        .row-check { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%) translateY(16px);
            padding: 12px 18px;
            border-radius: 12px;
            background: rgba(0,0,0,0.78);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: 0.3s ease;
            font-weight: 700;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 900px) {
            header { flex-direction: column; gap: 12px; }
            #vault-view { height: 88vh; padding: 16px; width: 96vw; }
            .vault-header { align-items: flex-start; flex-direction: column; gap: 12px; }
            .vault-actions { width: 100%; justify-content: flex-start; }
            .vault-tools { width: 100%; grid-template-columns: 1fr; }
            .vault-dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .kanji { font-size: 110px; }
        }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div id="sakura-container"></div>

    <svg class="robot-mascot" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
        <line x1="100" y1="50" x2="100" y2="20" stroke="#8d99ae" stroke-width="4"/>
        <circle cx="100" cy="15" r="8" fill="#ff3366">
            <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" />
        </circle>
        <rect x="50" y="50" width="100" height="70" rx="20" fill="#e0e1dd" stroke="#8d99ae" stroke-width="3"/>
        <rect x="60" y="65" width="80" height="35" rx="10" fill="#0b132b"/>
        <path d="M 75 80 Q 85 70 90 80" fill="none" stroke="#00f5d4" stroke-width="4" stroke-linecap="round"/>
        <path d="M 110 80 Q 115 70 125 80" fill="none" stroke="#00f5d4" stroke-width="4" stroke-linecap="round"/>
        <rect x="65" y="130" width="70" height="80" rx="15" fill="#e0e1dd" stroke="#8d99ae" stroke-width="3"/>
        <circle cx="100" cy="170" r="15" fill="#00f5d4"/>
        <path d="M 65 140 Q 30 130 40 100" fill="none" stroke="#e0e1dd" stroke-width="12" stroke-linecap="round"/>
        <path d="M 135 140 Q 170 130 160 100" fill="none" stroke="#e0e1dd" stroke-width="12" stroke-linecap="round"/>
    </svg>

    <header>
        <div class="logo"><span>Nihongo</span> Pro</div>
        <nav>
            <button id="btn-slide" class="active" onclick="switchTab('slide')">Học Trình Chiếu</button>
            <button id="btn-form" onclick="switchTab('form')">Thêm Dữ Liệu</button>
            <button id="btn-vault" onclick="switchTab('vault')">Kho Lưu Trữ</button>
        </nav>
    </header>

    <div class="view-container">
        
        <div id="slide-view" onclick="advanceStep()">
            <div id="slide-wrapper" style="text-align: center;">
                <div id="text-kanji" class="kanji"></div>
                <div class="reveal-info">
                    <div id="text-amhan" class="reveal-item amhan"></div>
                    <div id="text-hiragana" class="reveal-item hiragana"></div>
                    <div id="text-nghia" class="reveal-item nghia"></div>
                </div>
            </div>
            <div class="hint">Click chuột hoặc ấn Space để lật thẻ</div>
            <div class="counter" id="slide-counter">0 / 0</div>
        </div>

        <div id="form-view">
            <h2 style="text-align: center; margin-bottom: 25px; color: #fff;">Nạp Thêm Từ Mới</h2>
            <form id="vocab-form" onsubmit="addVocab(event)">
                <div class="form-group">
                    <label>Kanji (Màu đỏ)</label>
                    <input type="text" id="input-vocab" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Âm Hán (Có thể trống)</label>
                    <input type="text" id="input-amhan" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Hiragana</label>
                    <input type="text" id="input-hiragana" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Nghĩa</label>
                    <input type="text" id="input-nghia" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Ghi chú (Có thể trống)</label>
                    <textarea id="input-ghichu" placeholder="Ví dụ: cách dùng, ví dụ câu, lưu ý dễ nhầm..." autocomplete="off"></textarea>
                </div>
                <button type="submit" class="btn-submit">+ Ghi Nhớ / Cập Nhật</button>
            </form>
        </div>

        <div id="vault-view">
            <div class="vault-header">
                <div class="vault-title-block">
                    <div class="vault-heading">
                        <h2 style="color: #fff;">Quản Lý Từ Vựng</h2>
                        <span class="vault-badge">PRO VAULT</span>
                    </div>
                    <div id="vault-stats" class="vault-stats">Đang tải kho lưu trữ...</div>
                </div>
                <div class="vault-actions">
                    <label class="btn-import" for="import-file">⬆ Import Excel/CSV</label>
                    <input id="import-file" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importVocabFile(event)">
                    <button class="btn-export" onclick="exportExcel()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Xuất Excel
                    </button>
                    <button class="btn-delete-selected" onclick="deleteSelectedWords()">Xóa đã chọn</button>
                    <button class="btn-delete-all" onclick="deleteAllWords()">Xóa hết</button>
                </div>
            </div>
            <div class="vault-dashboard">
                <div class="stat-card"><div class="stat-label">Tổng từ</div><div id="stat-total" class="stat-value">0</div></div>
                <div class="stat-card"><div class="stat-label">Đang hiển thị</div><div id="stat-visible" class="stat-value">0</div></div>
                <div class="stat-card"><div class="stat-label">Đã chọn</div><div id="stat-selected" class="stat-value">0</div></div>
                <div class="stat-card"><div class="stat-label">Có ghi chú</div><div id="stat-notes" class="stat-value">0</div></div>
            </div>
            <div class="vault-tools">
                <input id="vault-search" class="vault-search" type="text" placeholder="Tìm theo Kanji, Âm Hán, Hiragana, Nghĩa, Ghi chú..." oninput="renderTable()">
                <select id="vault-sort" class="vault-select" onchange="renderTable(); saveAppState();">
                    <option value="newest">Mới thêm trước</option>
                    <option value="kanji">Sắp xếp Kanji</option>
                    <option value="hiragana">Sắp xếp Hiragana</option>
                    <option value="amhan">Sắp xếp Âm Hán</option>
                    <option value="nghia">Sắp xếp Nghĩa</option>
                </select>
                <label class="filter-chip"><input id="filter-has-note" type="checkbox" onchange="renderTable(); saveAppState();"> Chỉ có ghi chú</label>
                <button class="btn-small" onclick="selectFilteredWords(true)">Chọn kết quả lọc</button>
                <button class="btn-small" onclick="selectFilteredWords(false)">Bỏ chọn lọc</button>
            </div>
            <div class="table-container">
                <table class="vocab-table">
                    <thead>
                        <tr>
                            <th class="col-check"><input id="check-all-visible" class="row-check" type="checkbox" onchange="toggleSelectAllVisible(this.checked)"></th>
                            <th class="col-index">STT</th>
                            <th class="col-kanji">Kanji</th>
                            <th class="col-amhan">Âm Hán</th>
                            <th class="col-hira">Hiragana</th>
                            <th class="col-meaning">Nghĩa</th>
                            <th class="col-note">Ghi chú</th>
                            <th class="col-action">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- TẠO HIỆU ỨNG HOA ANH ĐÀO ---
        function createSakura() {
            const container = document.getElementById('sakura-container');
            const petalCount = 35;
            for (let i = 0; i < petalCount; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');

                let size = Math.random() * 10 + 8;
                petal.style.width = `${size}px`;
                petal.style.height = `${size * 1.5}px`;
                petal.style.left = `${Math.random() * 100}vw`;

                let duration = Math.random() * 5 + 5;
                let delay = Math.random() * 10;

                petal.style.animationDuration = `${duration}s, 3s`;
                petal.style.animationDelay = `${delay}s, ${delay}s`;

                container.appendChild(petal);
            }
        }
        createSakura();

        // --- HỆ THỐNG LƯU TRỮ TỪ VỰNG ---
        const STORAGE_KEY = "nihongoProVocabularyList_v3";
        const OLD_STORAGE_KEYS = ["nihongoProVocabularyList_v2", "nihongoProVocabularyList"];
        const APP_STATE_KEY = "nihongoProAppState_v1";
        let lastSavedSnapshot = "";
        let activeTab = "slide";

        const defaultVocabularyList = [
            { vocab: "聴解", amhan: "Thính Giải", hiragana: "ちょうかい", nghia: "Nghe hiểu", ghichu: "" },
            { vocab: "努力", amhan: "Nỗ Lực", hiragana: "どりょく", nghia: "Cố gắng, Chăm chỉ", ghichu: "" },
            { vocab: "開発", amhan: "Khai Phát", hiragana: "かいはつ", nghia: "Phát triển", ghichu: "" }
        ];

        let vocabularyList = loadVocabularyList();
        let selectedIndexes = new Set();
        let currentIndex = 0;
        let stepCounter = 0;

        function normalizeWord(word) {
            const get = (...keys) => {
                for (const key of keys) {
                    if (word && word[key] !== undefined && word[key] !== null) return String(word[key]).trim();
                }
                return "";
            };

            return {
                vocab: get("vocab", "kanji", "Kanji", "Từ vựng", "Từ Vựng", "Hán tự", "漢字"),
                amhan: get("amhan", "amHan", "Âm Hán", "Am Han", "âm hán", "Âm Hán Việt", "hanviet"),
                hiragana: get("hiragana", "Hiragana", "hirgana", "Hirgana", "kana", "reading", "Cách đọc", "Đọc", "読み方"),
                nghia: get("nghia", "Nghĩa", "nghĩa", "meaning", "Ý nghĩa", "Vietnamese", "Tiếng Việt"),
                ghichu: get("ghichu", "ghiChu", "ghi_chu", "Ghi chú", "Ghi Chú", "Ghi chu", "Ghi Chu", "note", "notes", "Note", "Notes", "Lưu ý", "Luu y", "Ghi chú/Lời giải")
            };
        }

        function normalizeForKey(value) {
            return String(value ?? "")
                .normalize("NFKC")
                .trim()
                .replace(/\s+/g, " ")
                .toLowerCase();
        }

        function compactForKey(value) {
            return normalizeForKey(value).replace(/\s+/g, "");
        }

        function exactWordKey(word) {
            const w = normalizeWord(word);
            return [w.vocab, w.amhan, w.hiragana, w.nghia, w.ghichu].map(compactForKey).join("||");
        }

        function mainWordKey(word) {
            const w = normalizeWord(word);
            // Khóa chính để chống trùng nghiêm ngặt trong kho: cùng Kanji + cùng Hiragana thì xem là một từ.
            // Nếu thiếu Hiragana, dùng Kanji + Nghĩa để tránh nhập trùng từ cùng nghĩa.
            const vocab = compactForKey(w.vocab);
            const hira = compactForKey(w.hiragana);
            const meaning = compactForKey(w.nghia);
            if (!vocab) return "";
            if (hira) return `V:${vocab}|H:${hira}`;
            if (meaning) return `V:${vocab}|M:${meaning}`;
            return `V:${vocab}`;
        }

        function mergeWord(oldWord, newWord, options = {}) {
            const oldClean = normalizeWord(oldWord);
            const newClean = normalizeWord(newWord);
            const allowEmpty = !!options.allowEmpty;

            // Khi cập nhật thủ công, cho phép người dùng cố tình xóa rỗng Âm Hán/Ghi chú.
            // Khi dedupe/import, mặc định vẫn giữ dữ liệu cũ nếu dữ liệu mới bị thiếu.
            const pick = (newValue, oldValue) => {
                if (allowEmpty) return newValue;
                return String(newValue || "").trim() ? newValue : oldValue;
            };

            const mergeNote = (newValue, oldValue) => {
                if (allowEmpty) return newValue;
                const newText = String(newValue || "").trim();
                const oldText = String(oldValue || "").trim();
                if (!newText) return oldValue;
                if (!oldText) return newValue;
                if (compactForKey(newText) === compactForKey(oldText)) return oldValue;
                return `${oldText}
${newText}`;
            };

            return {
                vocab: pick(newClean.vocab, oldClean.vocab),
                amhan: pick(newClean.amhan, oldClean.amhan),
                hiragana: pick(newClean.hiragana, oldClean.hiragana),
                nghia: pick(newClean.nghia, oldClean.nghia),
                ghichu: mergeNote(newClean.ghichu, oldClean.ghichu)
            };
        }

        function dedupeVocabularyList() {
            const seenExact = new Map();
            const seenMain = new Map();
            const output = [];
            let removed = 0;

            vocabularyList.map(normalizeWord).filter(w => w.vocab).forEach(word => {
                const exactKey = exactWordKey(word);
                const mainKey = mainWordKey(word);

                if (exactKey && seenExact.has(exactKey)) {
                    const idx = seenExact.get(exactKey);
                    output[idx] = mergeWord(output[idx], word);
                    removed++;
                    return;
                }

                if (mainKey && seenMain.has(mainKey)) {
                    const idx = seenMain.get(mainKey);
                    output[idx] = mergeWord(output[idx], word);
                    seenExact.set(exactWordKey(output[idx]), idx);
                    removed++;
                    return;
                }

                output.push(word);
                const idx = output.length - 1;
                if (exactKey) seenExact.set(exactKey, idx);
                if (mainKey) seenMain.set(mainKey, idx);
            });

            vocabularyList = output;
            return removed;
        }

        function loadVocabularyList() {
            try {
                let raw = localStorage.getItem(STORAGE_KEY);

                // Nếu bản mới chưa có dữ liệu, tự chuyển dữ liệu từ key cũ sang key mới.
                if (!raw) {
                    for (const oldKey of OLD_STORAGE_KEYS) {
                        const oldRaw = localStorage.getItem(oldKey);
                        if (oldRaw) {
                            raw = oldRaw;
                            break;
                        }
                    }
                }

                // Chỉ nạp dữ liệu mặc định khi trình duyệt CHƯA TỪNG có kho lưu trữ.
                // Nếu localStorage đang lưu [] thì phải tôn trọng kho rỗng của người dùng.
                if (raw === null || raw === undefined || raw === "") {
                    return defaultVocabularyList.map(w => ({ ...w }));
                }

                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed)) return defaultVocabularyList.map(w => ({ ...w }));

                // Quan trọng: không tự nạp lại defaultVocabularyList khi cleaned.length === 0.
                // Người dùng có thể đã bấm "Xóa hết", nên mảng rỗng là trạng thái hợp lệ.
                const cleaned = parsed.map(normalizeWord).filter(w => w.vocab);

                // Không được gọi dedupeVocabularyList() ở đây vì lúc này biến vocabularyList
                // vẫn đang trong quá trình khởi tạo. Gọi sớm sẽ làm trình duyệt bắt lỗi
                // rồi quay về dữ liệu mặc định sau mỗi lần reload.
                return cleaned;
            } catch (error) {
                console.warn("Không đọc được kho lưu trữ:", error);
                return defaultVocabularyList.map(w => ({ ...w }));
            }
        }

        function saveVocabularyList(options = {}) {
            try {
                dedupeVocabularyList();
                const snapshot = JSON.stringify(vocabularyList);
                localStorage.setItem(STORAGE_KEY, snapshot);

                // Xóa key cũ để reload không bị kéo lại dữ liệu phiên bản trước.
                OLD_STORAGE_KEYS.forEach(key => {
                    if (key !== STORAGE_KEY) localStorage.removeItem(key);
                });

                lastSavedSnapshot = snapshot;
                updateVaultStats();

                // QUAN TRỌNG: Khi trang vừa load, chỉ được lưu kho từ vựng,
                // không được ghi đè trạng thái autosave giao diện cũ.
                if (!options.skipStateSave) saveAppState();
            } catch (error) {
                alert("Trình duyệt không cho lưu dữ liệu. Cậu hãy xuất file Excel để sao lưu nhé!");
                console.error(error);
            }
        }

        function reloadVocabularyFromStorage() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw || raw === lastSavedSnapshot) return;

                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed)) return;

                vocabularyList = parsed.map(normalizeWord).filter(w => w.vocab);
                dedupeVocabularyList();
                lastSavedSnapshot = JSON.stringify(vocabularyList);
                syncSelectedIndexes();
                if (currentIndex >= vocabularyList.length) currentIndex = Math.max(0, vocabularyList.length - 1);
                renderTable();
                renderWord();
            } catch (error) {
                console.warn("Không đồng bộ được dữ liệu mới:", error);
            }
        }

        window.addEventListener("storage", (event) => {
            if (event.key === STORAGE_KEY) reloadVocabularyFromStorage();
        });

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) reloadVocabularyFromStorage();
        });

        function escapeHTML(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showToast(message) {
            let toast = document.getElementById("app-toast");
            if (!toast) {
                toast = document.createElement("div");
                toast.id = "app-toast";
                toast.className = "toast";
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
        }


        // --- AUTOSAVE TRẠNG THÁI GIAO DIỆN ---
        function safeGetValue(id) {
            const el = document.getElementById(id);
            return el ? el.value : "";
        }

        function safeSetValue(id, value) {
            const el = document.getElementById(id);
            if (el) el.value = value || "";
        }

        function clampNumber(value, min, max) {
            const num = Number(value);
            if (!Number.isFinite(num)) return min;
            return Math.max(min, Math.min(max, Math.floor(num)));
        }

        function loadAppState() {
            try {
                const raw = localStorage.getItem(APP_STATE_KEY);
                if (!raw) return {};
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === "object" ? parsed : {};
            } catch (error) {
                console.warn("Không đọc được trạng thái autosave:", error);
                return {};
            }
        }

        function saveAppState() {
            try {
                const state = {
                    activeTab,
                    currentIndex,
                    stepCounter,
                    formDraft: {
                        vocab: safeGetValue("input-vocab"),
                        amhan: safeGetValue("input-amhan"),
                        hiragana: safeGetValue("input-hiragana"),
                        nghia: safeGetValue("input-nghia"),
                        ghichu: safeGetValue("input-ghichu")
                    },
                    vaultSearch: safeGetValue("vault-search"),
                    vaultSort: safeGetValue("vault-sort") || "newest",
                    filterHasNote: !!(document.getElementById("filter-has-note") && document.getElementById("filter-has-note").checked),
                    selectedIndexes: [...selectedIndexes],
                    updatedAt: new Date().toISOString()
                };
                localStorage.setItem(APP_STATE_KEY, JSON.stringify(state));
            } catch (error) {
                console.warn("Không lưu được trạng thái autosave:", error);
            }
        }

        function applyRevealStep(savedStep) {
            if (vocabularyList.length === 0) return;

            const wrapper = document.getElementById("slide-wrapper");
            hideRevealInfo();
            if (wrapper) wrapper.classList.remove("slide-up");

            const currentWord = vocabularyList[currentIndex] || vocabularyList[0];
            const revealIds = getRevealIds(currentWord);
            stepCounter = clampNumber(savedStep, 0, revealIds.length);

            if (stepCounter > 0 && wrapper) wrapper.classList.add("slide-up");
            for (let i = 0; i < stepCounter; i++) {
                const el = document.getElementById(revealIds[i]);
                if (el) el.classList.add("visible");
            }
        }

        function restoreAppState() {
            const state = loadAppState();

            if (vocabularyList.length > 0) {
                currentIndex = clampNumber(state.currentIndex, 0, vocabularyList.length - 1);
            } else {
                currentIndex = 0;
            }

            safeSetValue("input-vocab", state.formDraft && state.formDraft.vocab);
            safeSetValue("input-amhan", state.formDraft && state.formDraft.amhan);
            safeSetValue("input-hiragana", state.formDraft && state.formDraft.hiragana);
            safeSetValue("input-nghia", state.formDraft && state.formDraft.nghia);
            safeSetValue("input-ghichu", state.formDraft && state.formDraft.ghichu);
            safeSetValue("vault-search", state.vaultSearch);
            safeSetValue("vault-sort", state.vaultSort || "newest");
            const noteFilter = document.getElementById("filter-has-note");
            if (noteFilter) noteFilter.checked = !!state.filterHasNote;

            selectedIndexes = new Set(Array.isArray(state.selectedIndexes) ? state.selectedIndexes : []);
            syncSelectedIndexes();

            const savedTab = ["slide", "form", "vault"].includes(state.activeTab) ? state.activeTab : "slide";
            switchTab(savedTab, { skipSave: true });
            applyRevealStep(state.stepCounter || 0);
            saveAppState();
        }

        function setupAutosaveListeners() {
            ["input-vocab", "input-amhan", "input-hiragana", "input-nghia", "input-ghichu", "vault-search", "vault-sort"].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener("input", () => {
                    saveAppState();
                    if (id === "vault-search") renderTable();
                });
            });

            // Không lưu ở beforeunload nữa.
            // Autosave realtime theo input đã đủ; beforeunload có thể đọc form đang bị trình duyệt dọn rỗng
            // rồi ghi đè draft cũ bằng chuỗi rỗng khi reload.
        }

        function duplicateIndexOf(word) {
            const cleaned = normalizeWord(word);
            const exactKey = exactWordKey(cleaned);
            const mainKey = mainWordKey(cleaned);

            const exactIndex = vocabularyList.findIndex(existing => exactWordKey(existing) === exactKey);
            if (exactIndex >= 0) return exactIndex;

            if (mainKey) {
                return vocabularyList.findIndex(existing => mainWordKey(existing) === mainKey);
            }
            return -1;
        }

        function upsertWord(word, options = {}) {
            const cleaned = normalizeWord(word);
            if (!cleaned.vocab) return "skipped";

            const index = duplicateIndexOf(cleaned);
            if (index >= 0) {
                const before = exactWordKey(vocabularyList[index]);
                vocabularyList[index] = mergeWord(vocabularyList[index], cleaned, options);
                const after = exactWordKey(vocabularyList[index]);
                return before === after ? "duplicate" : "updated";
            }

            vocabularyList.push(cleaned);
            return "added";
        }

        function updateVaultStats() {
            const stats = document.getElementById("vault-stats");
            const visibleCount = getFilteredIndexes().length;
            const notesCount = vocabularyList.filter(word => String(word.ghichu || "").trim()).length;

            if (stats) {
                stats.textContent = `Tổng: ${vocabularyList.length} từ · Đang hiển thị: ${visibleCount} · Đã chọn: ${selectedIndexes.size} · Có ghi chú: ${notesCount} · Tự lưu: bật`;
            }

            const setStat = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value;
            };
            setStat("stat-total", vocabularyList.length);
            setStat("stat-visible", visibleCount);
            setStat("stat-selected", selectedIndexes.size);
            setStat("stat-notes", notesCount);
        }

        // --- HỌC TRÌNH CHIẾU ---
        function getRevealIds(word) {
            const ids = [];
            if (word.amhan && word.amhan.trim()) ids.push("text-amhan");
            ids.push("text-hiragana");
            ids.push("text-nghia");
            return ids;
        }

        function hideRevealInfo() {
            ["text-amhan", "text-hiragana", "text-nghia"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove("visible");
            });
        }

        function renderWord() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.classList.remove('slide-up');
            hideRevealInfo();

            if (vocabularyList.length === 0) {
                document.getElementById('text-kanji').innerText = "Trống!";
                document.getElementById('text-kanji').style.color = "#fff";
                document.getElementById('text-amhan').innerText = "";
                document.getElementById('text-hiragana').innerText = "Vào 'Thêm dữ liệu' hoặc import Excel/CSV để nạp từ nhé";
                document.getElementById('text-hiragana').classList.add('visible');
                document.getElementById('text-nghia').innerText = "";
                document.getElementById('slide-counter').innerText = `0 / 0`;
                return;
            }

            if (currentIndex >= vocabularyList.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = 0;

            document.getElementById('text-kanji').style.color = "var(--kanji-color)";
            const currentWord = vocabularyList[currentIndex];
            stepCounter = 0;

            document.getElementById('text-kanji').innerText = currentWord.vocab || "";
            document.getElementById('text-amhan').innerText = currentWord.amhan || "";
            document.getElementById('text-hiragana').innerText = currentWord.hiragana || "";
            document.getElementById('text-nghia').innerText = currentWord.nghia || "";

            document.getElementById('slide-counter').innerText = `${currentIndex + 1} / ${vocabularyList.length}`;
        }

        function advanceStep() {
            if (vocabularyList.length === 0) return;

            const currentWord = vocabularyList[currentIndex];
            const wrapper = document.getElementById('slide-wrapper');
            const revealIds = getRevealIds(currentWord);

            if (stepCounter < revealIds.length) {
                wrapper.classList.add('slide-up');
                document.getElementById(revealIds[stepCounter]).classList.add('visible');
                stepCounter++;
                saveAppState();
                return;
            }

            currentIndex = (currentIndex + 1) % vocabularyList.length;
            renderWord();
            saveAppState();
        }

        // --- THÊM / CẬP NHẬT TỪ ---
        function addVocab(event) {
            event.preventDefault();

            const newVocab = {
                vocab: document.getElementById('input-vocab').value,
                amhan: document.getElementById('input-amhan').value,
                hiragana: document.getElementById('input-hiragana').value,
                nghia: document.getElementById('input-nghia').value,
                ghichu: document.getElementById('input-ghichu').value
            };

            const result = upsertWord(newVocab, { allowEmpty: true });
            saveVocabularyList();

            const cleaned = normalizeWord(newVocab);
            const foundIndex = duplicateIndexOf(cleaned);
            currentIndex = foundIndex >= 0 ? foundIndex : Math.max(0, vocabularyList.length - 1);

            document.getElementById('vocab-form').reset();
            selectedIndexes.clear();
            renderTable();
            renderWord();
            switchTab('slide');

            if (result === "duplicate") showToast("Từ này đã có trong kho, không thêm trùng.");
            else if (result === "updated") showToast("Đã cập nhật từ vựng trùng trong kho.");
            else showToast("Đã thêm từ mới và tự lưu vào kho.");
        }

        // --- KHO LƯU TRỮ ---
        function getSearchQuery() {
            const input = document.getElementById("vault-search");
            return input ? input.value.trim() : "";
        }

        function getSortMode() {
            const sort = document.getElementById("vault-sort");
            return sort ? sort.value : "newest";
        }

        function isOnlyNotesMode() {
            const checkbox = document.getElementById("filter-has-note");
            return !!(checkbox && checkbox.checked);
        }

        function wordMatchesQuery(word, query) {
            const normalizedQuery = normalizeForKey(query);
            if (!normalizedQuery) return true;
            return [word.vocab, word.amhan, word.hiragana, word.nghia, word.ghichu]
                .some(value => normalizeForKey(value).includes(normalizedQuery));
        }

        function getFilteredIndexes() {
            const query = getSearchQuery();
            const onlyNotes = isOnlyNotesMode();
            const sortMode = getSortMode();

            const items = vocabularyList
                .map((word, index) => ({ word, index }))
                .filter(item => wordMatchesQuery(item.word, query))
                .filter(item => !onlyNotes || String(item.word.ghichu || "").trim());

            if (sortMode === "newest") {
                items.sort((a, b) => b.index - a.index);
            } else {
                const fieldMap = { kanji: "vocab", hiragana: "hiragana", amhan: "amhan", nghia: "nghia" };
                const field = fieldMap[sortMode] || "vocab";
                items.sort((a, b) => normalizeForKey(a.word[field]).localeCompare(normalizeForKey(b.word[field]), "vi"));
            }

            return items.map(item => item.index);
        }

        function syncSelectedIndexes() {
            selectedIndexes = new Set([...selectedIndexes].filter(index => index >= 0 && index < vocabularyList.length));
        }

        function renderTable() {
            syncSelectedIndexes();

            const tbody = document.getElementById('table-body');
            const visibleIndexes = getFilteredIndexes();
            tbody.innerHTML = '';

            if (vocabularyList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#888; padding: 34px;">Kho từ vựng đang trống</td></tr>`;
                updateVaultStats();
                return;
            }

            if (visibleIndexes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#888; padding: 34px;">Không tìm thấy từ phù hợp</td></tr>`;
                updateVaultStats();
                return;
            }

            visibleIndexes.forEach((index, visibleOrder) => {
                const word = normalizeWord(vocabularyList[index]);
                const noteHTML = word.ghichu
                    ? `<div class="note-cell">${escapeHTML(word.ghichu)}</div>`
                    : `<span class="note-empty">Chưa có ghi chú</span>`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-check">
                        <input class="row-check" type="checkbox" ${selectedIndexes.has(index) ? "checked" : ""} onchange="toggleSelectWord(${index}, this.checked)">
                    </td>
                    <td class="col-index">${visibleOrder + 1}</td>
                    <td class="col-kanji"><div class="kanji-cell">${escapeHTML(word.vocab)}</div></td>
                    <td class="col-amhan">${escapeHTML(word.amhan)}</td>
                    <td class="col-hira"><div class="hira-cell">${escapeHTML(word.hiragana)}</div></td>
                    <td class="col-meaning"><div class="meaning-cell">${escapeHTML(word.nghia)}</div></td>
                    <td class="col-note">${noteHTML}</td>
                    <td class="col-action">
                        <button class="btn-delete" onclick="deleteWord(${index})">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const checkAll = document.getElementById("check-all-visible");
            if (checkAll) {
                checkAll.checked = visibleIndexes.length > 0 && visibleIndexes.every(index => selectedIndexes.has(index));
                checkAll.indeterminate = visibleIndexes.some(index => selectedIndexes.has(index)) && !checkAll.checked;
            }

            updateVaultStats();
        }

        function toggleSelectWord(index, checked) {
            if (checked) selectedIndexes.add(index);
            else selectedIndexes.delete(index);
            renderTable();
            saveAppState();
        }

        function toggleSelectAllVisible(checked) {
            getFilteredIndexes().forEach(index => {
                if (checked) selectedIndexes.add(index);
                else selectedIndexes.delete(index);
            });
            renderTable();
            saveAppState();
        }

        function selectFilteredWords(checked) {
            toggleSelectAllVisible(checked);
        }

        function deleteWord(index) {
            const word = vocabularyList[index];
            if (!word) return;

            if (confirm(`Cậu có chắc muốn xóa "${word.vocab}" khỏi bộ nhớ?`)) {
                vocabularyList.splice(index, 1);

                selectedIndexes = new Set([...selectedIndexes]
                    .filter(i => i !== index)
                    .map(i => i > index ? i - 1 : i));

                if (currentIndex >= vocabularyList.length) {
                    currentIndex = Math.max(0, vocabularyList.length - 1);
                }

                saveVocabularyList();
                renderTable();
                renderWord();
                showToast("Đã xóa 1 từ và tự cập nhật kho.");
            }
        }

        function deleteSelectedWords() {
            if (selectedIndexes.size === 0) {
                alert("Cậu chưa chọn từ nào để xóa.");
                return;
            }

            const count = selectedIndexes.size;
            if (!confirm(`Cậu có chắc muốn xóa ${count} từ đã chọn không?`)) return;

            [...selectedIndexes].sort((a, b) => b - a).forEach(index => {
                vocabularyList.splice(index, 1);
            });

            selectedIndexes.clear();
            if (currentIndex >= vocabularyList.length) currentIndex = Math.max(0, vocabularyList.length - 1);

            saveVocabularyList();
            renderTable();
            renderWord();
            showToast(`Đã xóa ${count} từ đã chọn.`);
        }

        function deleteAllWords() {
            if (vocabularyList.length === 0) {
                alert("Kho đang trống rồi cậu ơi.");
                return;
            }

            if (!confirm("Cậu có chắc muốn xóa HẾT TẤT CẢ từ vựng trong kho không?")) return;
            if (!confirm("Xác nhận lần nữa nhé: thao tác này sẽ xóa toàn bộ kho đang lưu trên trình duyệt này.")) return;

            vocabularyList = [];
            selectedIndexes.clear();
            currentIndex = 0;
            saveVocabularyList();
            renderTable();
            renderWord();
            showToast("Đã xóa toàn bộ kho từ vựng.");
        }

        // --- IMPORT EXCEL / CSV ---
        function cleanHeader(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, "")
                .replace(/[_\-–—:：().\[\]/\\]/g, "")
                .toLowerCase();
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let value = "";
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"' && inQuotes && next === '"') {
                    value += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if ((char === "," || char === "\t" || char === ";") && !inQuotes) {
                    row.push(value);
                    value = "";
                } else if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && next === "\n") i++;
                    row.push(value);
                    if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
                    row = [];
                    value = "";
                } else {
                    value += char;
                }
            }

            row.push(value);
            if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
            return rows;
        }

        function columnTypeFromHeader(cell) {
            const h = cleanHeader(cell);
            if (!h) return "";
            if (["kanji", "han", "hantu", "tuvung", "tunguvung", "vocab", "vocabulary", "word", "japanese", "nhatngu", "漢字"].includes(h) || h.includes("kanji")) return "kanji";
            if (["amhan", "amhanviet", "hanviet", "onhan", "onyomi"].includes(h) || h.includes("amhan") || h.includes("hanviet")) return "amhan";
            if (["hiragana", "hirgana", "kana", "cachd", "cachdoc", "doc", "yomikata", "reading", "furigana", "読み方"].includes(h) || h.includes("hiragana") || h.includes("hirgana")) return "hiragana";
            if (["nghia", "ynghia", "meaning", "mean", "vietnamese", "tiengviet", "dich", "translation"].includes(h) || h.includes("nghia") || h.includes("meaning")) return "nghia";
            if (["ghichu", "note", "notes", "luuy", "memo", "remark", "remarks", "comment", "comments"].includes(h) || h.includes("ghichu") || h.includes("note") || h.includes("luuy") || h.includes("memo")) return "ghichu";
            return "";
        }

        function isLikelyKanjiText(value) {
            const text = String(value || "").trim();
            return /[\u4E00-\u9FFF]/.test(text);
        }

        function isLikelyHiraganaText(value) {
            const text = String(value || "").trim();
            return /^[\u3040-\u309Fー\s・]+$/.test(text) && /[\u3040-\u309F]/.test(text);
        }

        function scoreColumnByContent(rows, colIndex, type) {
            let score = 0;
            const sample = rows.slice(0, 40);
            sample.forEach(row => {
                const text = String(row[colIndex] ?? "").trim();
                if (!text) return;
                if (type === "kanji" && isLikelyKanjiText(text)) score += 3;
                if (type === "hiragana" && isLikelyHiraganaText(text)) score += 3;
                if (type === "amhan" && /^[A-ZÀ-ỸĐ\s\-]+$/.test(text.toUpperCase()) && !/[\u3040-\u30FF\u4E00-\u9FFF]/.test(text)) score += 1;
                if (type === "nghia" && /[a-zA-ZÀ-ỹđĐ]/.test(text) && !/[\u3040-\u30FF\u4E00-\u9FFF]/.test(text)) score += 1;
            });
            return score;
        }

        function buildMapFromHeader(row, rowIndex) {
            const map = { headerIndex: rowIndex, kanji: -1, amhan: -1, hiragana: -1, nghia: -1, ghichu: -1, score: 0 };
            row.forEach((cell, colIndex) => {
                const type = columnTypeFromHeader(cell);
                if (!type) return;
                if (map[type] < 0) {
                    map[type] = colIndex;
                    map.score += type === "kanji" ? 5 : 4;
                }
            });
            return map;
        }

        function countCoreColumns(map) {
            return [map.kanji, map.amhan, map.hiragana, map.nghia].filter(index => index >= 0).length;
        }

        function findHeaderMap(rows) {
            const candidates = rows.map((row, rowIndex) => buildMapFromHeader(row, rowIndex))
                .filter(map => map.kanji >= 0 && countCoreColumns(map) >= 3)
                .sort((a, b) => b.score - a.score || a.headerIndex - b.headerIndex);

            if (candidates.length) return candidates[0];

            // Fallback cho file bảng đáp án mẫu: E/F/G/H/I = Kanji/Âm Hán/Hiragana/Nghĩa/Ghi chú.
            if (rows.length > 3 && rows.some(row => isLikelyKanjiText(row[4])) && rows.some(row => isLikelyHiraganaText(row[6]))) {
                return { headerIndex: 2, kanji: 4, amhan: 5, hiragana: 6, nghia: 7, ghichu: 8, score: 10 };
            }

            // Fallback tự đoán cột nếu file không có hàng tiêu đề rõ ràng.
            const maxCols = Math.max(...rows.map(row => row.length));
            const contentRows = rows.filter(row => row.some(cell => String(cell || "").trim()));
            const guessed = { headerIndex: -1, kanji: -1, amhan: -1, hiragana: -1, nghia: -1, ghichu: -1, score: 0 };
            const colScores = [];
            for (let c = 0; c < maxCols; c++) {
                colScores.push({
                    col: c,
                    kanji: scoreColumnByContent(contentRows, c, "kanji"),
                    hiragana: scoreColumnByContent(contentRows, c, "hiragana"),
                    amhan: scoreColumnByContent(contentRows, c, "amhan"),
                    nghia: scoreColumnByContent(contentRows, c, "nghia"),
                    ghichu: scoreColumnByContent(contentRows, c, "ghichu")
                });
            }

            const used = new Set();
            const pick = (type) => {
                const best = colScores
                    .filter(item => !used.has(item.col))
                    .sort((a, b) => b[type] - a[type])[0];
                if (best && best[type] > 0) {
                    used.add(best.col);
                    guessed[type] = best.col;
                    guessed.score += best[type];
                }
            };

            pick("kanji");
            pick("hiragana");
            pick("amhan");
            pick("nghia");
            pick("ghichu");

            return guessed.kanji >= 0 && countCoreColumns(guessed) >= 3 ? guessed : null;
        }

        function isHeaderLikeWord(word) {
            const v = cleanHeader(word.vocab);
            return ["kanji", "hantu", "tuvung", "vocab", "vocabulary", "word", "loigiai", "ghichu", "note"].includes(v);
        }

        function extractVocabFromRows(rows) {
            if (!rows || !rows.length) return [];
            const map = findHeaderMap(rows);
            if (!map) return [];

            const output = [];
            const startRow = Math.max(0, map.headerIndex + 1);

            for (let r = startRow; r < rows.length; r++) {
                const row = rows[r] || [];
                const word = normalizeWord({
                    vocab: map.kanji >= 0 ? row[map.kanji] : "",
                    amhan: map.amhan >= 0 ? row[map.amhan] : "",
                    hiragana: map.hiragana >= 0 ? row[map.hiragana] : "",
                    nghia: map.nghia >= 0 ? row[map.nghia] : "",
                    ghichu: map.ghichu >= 0 ? row[map.ghichu] : ""
                });

                if (!word.vocab || isHeaderLikeWord(word)) continue;
                // Cần ít nhất Kanji + 2 cột thông tin còn lại để tránh bắt nhầm dữ liệu rác.
                const filled = [word.amhan, word.hiragana, word.nghia].filter(value => String(value || "").trim()).length;
                if (filled < 2) continue;
                output.push(word);
            }

            return output;
        }

        function finishImport(words, fileName) {
            const importSeen = new Set();
            const cleaned = [];
            let duplicateInsideFile = 0;

            words.map(normalizeWord).filter(word => word.vocab).forEach(word => {
                const key = mainWordKey(word) || exactWordKey(word);
                if (importSeen.has(key)) {
                    duplicateInsideFile++;
                    return;
                }
                importSeen.add(key);
                cleaned.push(word);
            });

            if (cleaned.length === 0) {
                alert("Không tìm thấy dữ liệu từ vựng. File cần có ít nhất 3 cột chính trong nhóm: Kanji / Âm Hán / Hiragana / Nghĩa. Nếu có cột Ghi chú thì hệ thống sẽ tự nhận thêm.");
                return;
            }

            let added = 0, updated = 0, duplicate = 0, skipped = 0;
            cleaned.forEach(word => {
                const result = upsertWord(word);
                if (result === "added") added++;
                else if (result === "updated") updated++;
                else if (result === "duplicate") duplicate++;
                else skipped++;
            });

            const removedFromStorage = dedupeVocabularyList();
            selectedIndexes.clear();
            saveVocabularyList();
            renderTable();
            renderWord();
            switchTab("vault");

            const parts = [`thêm ${added}`, `cập nhật ${updated}`, `trùng không thêm ${duplicate + duplicateInsideFile + removedFromStorage}`];
            if (skipped) parts.push(`bỏ qua ${skipped}`);
            showToast(`Import xong: ${parts.join(", ")}.`);
            console.log("Imported file:", fileName, { added, updated, duplicate, duplicateInsideFile, removedFromStorage, skipped });
        }

        function importVocabFile(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const extension = file.name.split(".").pop().toLowerCase();

            if (extension === "csv") {
                const reader = new FileReader();
                reader.onload = e => {
                    const rows = parseCSV(e.target.result || "");
                    finishImport(extractVocabFromRows(rows), file.name);
                    event.target.value = "";
                };
                reader.onerror = () => alert("Không đọc được file CSV.");
                reader.readAsText(file, "utf-8");
                return;
            }

            if (!window.XLSX) {
                alert("Chưa tải được thư viện đọc Excel. Cậu mở web khi có mạng hoặc import file CSV nhé.");
                event.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: "array" });
                    let allWords = [];

                    workbook.SheetNames.forEach(sheetName => {
                        const sheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                        allWords = allWords.concat(extractVocabFromRows(rows));
                    });

                    finishImport(allWords, file.name);
                } catch (error) {
                    console.error(error);
                    alert("Không import được file Excel. Cậu kiểm tra lại định dạng .xlsx/.xls nhé.");
                } finally {
                    event.target.value = "";
                }
            };
            reader.onerror = () => alert("Không đọc được file Excel.");
            reader.readAsArrayBuffer(file);
        }

        // --- XUẤT FILE EXCEL / CSV ---
        function exportExcel() {
            if (vocabularyList.length === 0) {
                alert("Kho từ vựng trống, không có gì để xuất cả!");
                return;
            }

            const data = [
                ["Kanji", "Âm Hán", "Hiragana", "Nghĩa", "Ghi chú"],
                ...vocabularyList.map(row => [row.vocab, row.amhan, row.hiragana, row.nghia, row.ghichu || ""])
            ];

            if (window.XLSX) {
                const worksheet = XLSX.utils.aoa_to_sheet(data);
                worksheet["!cols"] = [
                    { wch: 18 },
                    { wch: 18 },
                    { wch: 18 },
                    { wch: 38 },
                    { wch: 48 }
                ];
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Kho_Tu_Vung");
                XLSX.writeFile(workbook, "Kho_Tu_Vung_Nihongo.xlsx");
                return;
            }

            let csvContent = "\uFEFF" + data.map(row => row.map(cell => {
                const text = String(cell ?? "");
                return `"${text.replace(/"/g, '""')}"`;
            }).join(",")).join("\n");

            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Kho_Tu_Vung_Nihongo.csv";
            document.body.appendChild(link);
            link.click();
            URL.revokeObjectURL(link.href);
            document.body.removeChild(link);
        }

        // --- CHUYỂN TAB ---
        function switchTab(tabId, options = {}) {
            activeTab = ["slide", "form", "vault"].includes(tabId) ? tabId : "slide";
            document.body.classList.toggle("vault-page-mode", activeTab === "vault");

            document.getElementById('slide-view').style.display = 'none';
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('vault-view').style.display = 'none';

            document.getElementById('btn-slide').classList.remove('active');
            document.getElementById('btn-form').classList.remove('active');
            document.getElementById('btn-vault').classList.remove('active');

            if (activeTab === 'slide') {
                document.getElementById('slide-view').style.display = 'flex';
                document.getElementById('btn-slide').classList.add('active');
                renderWord();
            } else if (activeTab === 'form') {
                document.getElementById('form-view').style.display = 'block';
                document.getElementById('btn-form').classList.add('active');
            } else if (activeTab === 'vault') {
                document.getElementById('vault-view').style.display = 'flex';
                document.getElementById('btn-vault').classList.add('active');
                renderTable();
            }

            if (!options.skipSave) saveAppState();
        }

        // Bắt sự kiện phím
        document.addEventListener('keydown', (e) => {
            const activeElement = document.activeElement;
            const isTyping = activeElement && ["INPUT", "TEXTAREA", "SELECT"].includes(activeElement.tagName);

            if (document.getElementById('slide-view').style.display !== 'none' && !isTyping) {
                if ([' ', 'Enter', 'ArrowRight', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault();
                    advanceStep();
                }
            }
        });

        // Khởi chạy
        dedupeVocabularyList();
        lastSavedSnapshot = JSON.stringify(vocabularyList);
        setupAutosaveListeners();

        // Phải khôi phục trạng thái trước. Nếu saveVocabularyList() chạy trước,
        // nó sẽ ghi đè autosave cũ thành tab slide / index 0 / form rỗng mỗi lần reload.
        restoreAppState();

        // Chỉ lưu lại kho từ vựng đã dedupe/migrate, không đụng vào trạng thái giao diện vừa khôi phục.
        saveVocabularyList({ skipStateSave: true });
        renderTable();
    </script>
